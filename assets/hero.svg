<svg width="2560" height="940" viewBox="0 0 1280 470" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="OfficeSkills: extract a company's Word, PowerPoint or Excel template into a reusable Brand Profile, then generate unlimited on-brand documents of that same format. One skill per format, no cross-format conversion.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="470" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1022"/>
      <stop offset="0.55" stop-color="#111A36"/>
      <stop offset="1" stop-color="#0C1430"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6EA8FE"/>
      <stop offset="1" stop-color="#5B8DEF"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6EA8FE" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#6EA8FE" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#6EA8FE" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.4" cy="1.4" r="1.4" fill="#FFFFFF" fill-opacity="0.045"/>
    </pattern>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#6EA8FE"/>
    </marker>
  </defs>

  <rect width="1280" height="470" rx="20" fill="url(#bg)"/>
  <rect width="1280" height="470" rx="20" fill="url(#dots)"/>
  <rect x="0.5" y="0.5" width="1279" height="469" rx="20" fill="none" stroke="#FFFFFF" stroke-opacity="0.06"/>

  <!-- TOP BAND: wordmark + tagline -->
  <g>
    <rect x="44" y="40" width="16" height="16" rx="3.5" fill="#2B7CD3"/>
    <rect x="63" y="40" width="16" height="16" rx="3.5" fill="#E0742B"/>
    <rect x="44" y="59" width="16" height="16" rx="3.5" fill="#2BA45F"/>
    <rect x="63" y="59" width="16" height="16" rx="3.5" fill="#6EA8FE"/>
  </g>
  <text x="96" y="69" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, sans-serif" font-size="33" font-weight="800" letter-spacing="-0.5" fill="#FFFFFF">Office<tspan fill="#6EA8FE">Skills</tspan></text>

  <text x="1234" y="50" text-anchor="end" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14.5" font-weight="600" fill="#C9D8F5">Your company's Office template, learned once.</text>
  <text x="1234" y="73" text-anchor="end" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14.5" font-weight="500" fill="#9DB4E8">Unlimited on-brand documents, in the same format.</text>

  <line x1="44" y1="104" x2="1236" y2="104" stroke="#FFFFFF" stroke-opacity="0.07"/>

  <!-- STAGE A: company template -->
  <g filter="url(#soft)">
    <rect x="64" y="162" width="184" height="152" rx="12" fill="#161F3D" stroke="#2C3A66" stroke-width="1.5"/>
    <rect x="64" y="162" width="184" height="28" rx="12" fill="#1E2A50"/>
    <circle cx="84" cy="176" r="6" fill="url(#accent)"/>
    <rect x="98" y="172" width="58" height="8" rx="4" fill="#43568C"/>
    <text x="84" y="226" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="700" fill="#E8EEFF">Aa</text>
    <rect x="130" y="210" width="92" height="7" rx="3.5" fill="#3A4A7C"/>
    <rect x="130" y="224" width="72" height="7" rx="3.5" fill="#33426F"/>
    <rect x="84" y="244" width="19" height="19" rx="5" fill="#2B7CD3"/>
    <rect x="109" y="244" width="19" height="19" rx="5" fill="#E0742B"/>
    <rect x="134" y="244" width="19" height="19" rx="5" fill="#2BA45F"/>
    <rect x="159" y="244" width="19" height="19" rx="5" fill="#F472B6"/>
    <rect x="84" y="278" width="142" height="6" rx="3" fill="#2E3C68"/>
    <rect x="84" y="291" width="118" height="6" rx="3" fill="#2A375F"/>
    <rect x="64" y="200" width="184" height="20" fill="url(#scan)"/>
  </g>
  <text x="156" y="336" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12.5" fill="#9DB4E8">your company template</text>

  <!-- STEP 1: EXTRACT -->
  <line x1="256" y1="238" x2="378" y2="238" stroke="#3C4E84" stroke-width="2.5" stroke-dasharray="2 7" stroke-linecap="round" marker-end="url(#arrow)"/>
  <circle cx="296" cy="200" r="11" fill="url(#accent)"/>
  <text x="296" y="204" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="800" fill="#0B1022">1</text>
  <text x="314" y="204" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700" fill="#9DC0FF">EXTRACT</text>
  <text x="319" y="272" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11.5" fill="#7E96CC">learn the brand</text>

  <!-- STAGE B: Brand Profile -->
  <g filter="url(#soft)">
    <rect x="398" y="150" width="356" height="176" rx="14" fill="#16213F" stroke="url(#accent)" stroke-width="1.6"/>
    <g transform="translate(418,168)">
      <rect x="0" y="0" width="22" height="22" rx="4" fill="#0E1730" stroke="#6EA8FE" stroke-width="1.5"/>
      <rect x="5" y="0" width="12" height="7" rx="1" fill="#6EA8FE"/>
      <rect x="5" y="12" width="12" height="8" rx="1" fill="none" stroke="#6EA8FE" stroke-width="1.3"/>
    </g>
    <text x="450" y="178" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15.5" font-weight="700" fill="#EAF1FF">Brand Profile</text>
    <text x="450" y="196" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#8FA6D8">brand-kit/ · saved once, reused freely</text>
    <line x1="414" y1="208" x2="740" y2="208" stroke="#2C3A66"/>
    <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="12.5" fill="#C9D8F5">
      <circle cx="424" cy="230" r="2.6" fill="#6EA8FE"/><text x="434" y="234">colors &amp; fonts</text>
      <circle cx="424" cy="254" r="2.6" fill="#6EA8FE"/><text x="434" y="258">named styles -&gt; roles</text>
      <circle cx="424" cy="278" r="2.6" fill="#6EA8FE"/><text x="434" y="282">ordered structure</text>
      <circle cx="424" cy="302" r="2.6" fill="#6EA8FE"/><text x="434" y="306">layouts</text>
      <circle cx="586" cy="230" r="2.6" fill="#6EA8FE"/><text x="596" y="234">cover anchors</text>
      <circle cx="586" cy="254" r="2.6" fill="#6EA8FE"/><text x="596" y="258">logos &amp; media</text>
      <circle cx="586" cy="278" r="2.6" fill="#6EA8FE"/><text x="596" y="282">tables &amp; formulas</text>
      <circle cx="586" cy="302" r="2.6" fill="#6EA8FE"/><text x="596" y="306">byte-for-byte shell</text>
    </g>
  </g>

  <!-- STEP 2: GENERATE (single same-format output) -->
  <line x1="758" y1="238" x2="958" y2="238" stroke="#3C4E84" stroke-width="2.5" stroke-dasharray="2 7" stroke-linecap="round" marker-end="url(#arrow)"/>
  <circle cx="768" cy="200" r="11" fill="url(#accent)"/>
  <text x="768" y="204" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="800" fill="#0B1022">2</text>
  <text x="786" y="204" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700" fill="#9DC0FF">GENERATE</text>
  <text x="812" y="272" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11.5" fill="#7E96CC">fill the shell · QA pass</text>

  <!-- STAGE C: a stack of on-brand documents (same format as the template) -->
  <g filter="url(#soft)">
    <rect x="998" y="170" width="158" height="140" rx="10" fill="#16203E" stroke="#2C3A66" stroke-width="1.3" opacity="0.45"/>
    <rect x="986" y="182" width="158" height="140" rx="10" fill="#17243F" stroke="#33467A" stroke-width="1.3" opacity="0.75"/>
    <rect x="974" y="194" width="158" height="140" rx="10" fill="#1A2748" stroke="url(#accent)" stroke-width="1.6"/>
    <!-- branded front document -->
    <rect x="974" y="194" width="158" height="26" rx="10" fill="#244A86"/>
    <circle cx="992" cy="207" r="5" fill="#6EA8FE"/>
    <rect x="1004" y="203" width="48" height="7" rx="3.5" fill="#4E6BA8"/>
    <rect x="990" y="236" width="16" height="16" rx="4" fill="#2B7CD3"/>
    <rect x="1011" y="236" width="16" height="16" rx="4" fill="#E0742B"/>
    <rect x="1032" y="236" width="16" height="16" rx="4" fill="#2BA45F"/>
    <rect x="990" y="266" width="118" height="6" rx="3" fill="#33467A"/>
    <rect x="990" y="279" width="100" height="6" rx="3" fill="#2C3C68"/>
    <rect x="990" y="292" width="112" height="6" rx="3" fill="#2C3C68"/>
  </g>
  <text x="1058" y="352" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12.5" fill="#9DB4E8">unlimited on-brand documents</text>
  <text x="1058" y="368" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#7E96CC">same format as the template</text>

  <!-- FOOTER: one skill per format (no cross-format) -->
  <line x1="44" y1="384" x2="1236" y2="384" stroke="#FFFFFF" stroke-opacity="0.07"/>
  <text x="64" y="420" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12.5" font-weight="600" fill="#9DB4E8">One skill per format - same type in, same type out:</text>
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="12.5">
    <!-- Word -->
    <rect x="436" y="404" width="206" height="30" rx="8" fill="#16213F" stroke="#2C3A66"/>
    <rect x="448" y="411" width="16" height="16" rx="4" fill="#102742" stroke="#2B7CD3" stroke-width="1.2"/>
    <text x="456" y="423" text-anchor="middle" font-size="10" font-weight="800" fill="#7FB6F2">W</text>
    <text x="474" y="423" fill="#EAF1FF" font-weight="600">Word <tspan fill="#7E96CC" font-family="ui-monospace, Menlo, monospace" font-size="11">.docx -&gt; brand-docx</tspan></text>
    <!-- PowerPoint -->
    <rect x="654" y="404" width="246" height="30" rx="8" fill="#16213F" stroke="#2C3A66"/>
    <rect x="666" y="411" width="16" height="16" rx="4" fill="#33240F" stroke="#E0742B" stroke-width="1.2"/>
    <text x="674" y="423" text-anchor="middle" font-size="10" font-weight="800" fill="#F2A368">P</text>
    <text x="692" y="423" fill="#EAF1FF" font-weight="600">PowerPoint <tspan fill="#7E96CC" font-family="ui-monospace, Menlo, monospace" font-size="11">.pptx -&gt; brand-pptx</tspan></text>
    <!-- Excel -->
    <rect x="912" y="404" width="206" height="30" rx="8" fill="#16213F" stroke="#2C3A66"/>
    <rect x="924" y="411" width="16" height="16" rx="4" fill="#0F2A1C" stroke="#2BA45F" stroke-width="1.2"/>
    <text x="932" y="423" text-anchor="middle" font-size="10" font-weight="800" fill="#6FD79E">X</text>
    <text x="950" y="423" fill="#EAF1FF" font-weight="600">Excel <tspan fill="#7E96CC" font-family="ui-monospace, Menlo, monospace" font-size="11">.xlsx -&gt; brand-xlsx</tspan></text>
  </g>
</svg>
