<svg width="1280" height="540" viewBox="0 0 1280 540" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="BrandDocs: one company Word, PowerPoint or Excel template is extracted into a verified, reusable Brand Profile, which then generates unlimited on-brand documents of the same format. Off-brand output is impossible by construction.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="540" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1022"/>
      <stop offset="0.55" stop-color="#111A36"/>
      <stop offset="1" stop-color="#0C1430"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6EA8FE"/>
      <stop offset="1" stop-color="#5B8DEF"/>
    </linearGradient>
    <linearGradient id="flowL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3D4F82" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#6EA8FE" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="flowR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6EA8FE" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#3D4F82" stop-opacity="0.65"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6EA8FE" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#6EA8FE" stop-opacity="0"/>
    </radialGradient>
    <marker id="tipL" markerWidth="8" markerHeight="8" refX="5" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 z" fill="#6EA8FE" fill-opacity="0.9"/>
    </marker>
    <marker id="tipR" markerWidth="8" markerHeight="8" refX="5" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 z" fill="#5B8DEF" fill-opacity="0.8"/>
    </marker>
  </defs>

  <rect width="1280" height="540" rx="22" fill="url(#bg)"/>
  <rect x="1" y="1" width="1278" height="538" rx="22" fill="none" stroke="#FFFFFF" stroke-opacity="0.07"/>
  <ellipse cx="640" cy="285" rx="260" ry="185" fill="url(#glow)"/>

  <!-- TOP BAND -->
